<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hinglish YouTube Shorts banao bilkul free — AI script, Hinglish awaaz, aur real jaisi visuals.">
  <title>{% block title %}{{ title }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Inter for UI + Noto Sans Devanagari for Hindi text rendering -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <header class="header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-icon">▶</span>
        <div>
          <strong>Hinglish Shorts Creator</strong>
            <span class="brand-sub">🇮🇳 Bharat ke liye · 100% free · No API Keys</span>
        </div>
      </div>
      <div class="status-pill" id="systemStatus">System check...</div>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <p>Free Stack: Pollinations GPT-4o · Hinglish edge-TTS · Pollinations Images · FFmpeg &nbsp;|&nbsp; Made with ❤️ for India</p>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
